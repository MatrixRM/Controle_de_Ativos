<!DOCTYPE html>{% load static %}
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Controle de Ativos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #1e2330;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .login-wrapper { width: 100%; max-width: 400px; }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo__icon {
      width: 180px;
      height: auto;
      object-fit: contain;
      margin-bottom: 12px;
    }
    .login-logo h1 {
      font-size: 18px;
      font-weight: 600;
      color: #e2e8f0;
    }
    .login-logo p {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 4px;
    }
    .login-card {
      background: #ffffff;
      border-radius: 12px;
      padding: 32px;
    }
    .login-card .form-group { margin-bottom: 20px; }
    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #0f172a;
      margin-bottom: 6px;
    }
    .login-card .input-wrap {
      position: relative;
    }
    .login-card .input-wrap i {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 16px;
    }
    .login-card .input-wrap input {
      width: 100%;
      padding: 10px 12px 10px 40px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #0f172a;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .login-card .input-wrap input:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
    }
    .login-card .input-wrap input::placeholder { color: #9ca3af; }
    .login-btn {
      width: 100%;
      padding: 10px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #2563eb; }
    .login-error {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #991b1b;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    @media (max-width: 479px) {
      .login-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <img src="{% static 'core/img/logo.png' %}" alt="CA" class="login-logo__icon">
      <h1>Controle de Ativos</h1>
      <p>Faça login para acessar o sistema</p>
    </div>
    <div class="login-card">
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        {% if form.errors %}
        <div class="login-error">
          <i class="bi bi-exclamation-triangle"></i>
          Usuário ou senha inválidos. Tente novamente.
        </div>
        {% endif %}
        <div class="form-group">
          <label for="id_username">Usuário</label>
          <div class="input-wrap">
            <i class="bi bi-person"></i>
            <input type="text" name="username" id="id_username" placeholder="Seu usuário" required autofocus>
          </div>
        </div>
        <div class="form-group">
          <label for="id_password">Senha</label>
          <div class="input-wrap">
            <i class="bi bi-lock"></i>
            <input type="password" name="password" id="id_password" placeholder="Sua senha" required>
          </div>
        </div>
        <button type="submit" class="login-btn">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
